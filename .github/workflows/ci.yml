name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Show Python version
        run: uv run python --version && uv run python -c "import sys; print(sys.executable)"

      - name: Run tests
        run: |
          set -o pipefail
          uv run pytest -v --tb=short 2>&1 | tee /tmp/pytest_output.txt
        env:
          NO_COLOR: "1"

      - name: Post test output as PR comment (on failure)
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## CI Test Output (diagnostic)"
            echo ""
            echo '```'
            tail -200 /tmp/pytest_output.txt 2>/dev/null || echo "No output captured"
            echo '```'
          } > /tmp/comment_body.txt
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/comment_body.txt
